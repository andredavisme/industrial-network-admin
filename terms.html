<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Industrial Network — Terms</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <a class="brand" href="index.html">🏭 Industrial Network</a>
  <a href="index.html">Dashboard</a>
  <a href="entities.html">Entities</a>
  <a href="relationships.html">Relationships</a>
  <a href="products.html">Products</a>
  <a href="terms.html" class="active">Terms</a>
  <a href="portals.html">Portals</a>
</nav>

<main>
  <h1>Terms</h1>

  <div class="card">
    <h2>Add Term</h2>
    <form id="terms-form">
      <div class="form-row">
        <label>Entity *
          <select id="term-entity_id" required><option value="">Loading…</option></select>
        </label>
        <label>Linked Relationship (optional)
          <select id="term-rel_id"><option value="">General (no specific relationship)</option></select>
        </label>
      </div>
      <label>Title *
        <input id="term-title" type="text" required placeholder="Net 30 Payment Terms">
      </label>
      <label>Body *
        <textarea id="term-body" required placeholder="Full description of the term or condition…" style="min-height:120px"></textarea>
      </label>
      <button type="submit">Add Term</button>
      <div class="msg" id="terms-msg"></div>
    </form>
  </div>

  <div class="card">
    <h2>All Terms</h2>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Title</th><th>Entity</th><th>Active</th><th>Actions</th></tr></thead>
        <tbody id="terms-list"><tr><td colspan="4">Loading…</td></tr></tbody>
      </table>
    </div>
  </div>
</main>

<script type="module">
import { supabase } from './supabase.js';

async function loadSelects() {
  const { data: entities } = await supabase.from('network_entities').select('id, legal_name').order('legal_name');
  document.getElementById('term-entity_id').innerHTML = '<option value="">Select entity…</option>' + (entities||[]).map(e=>`<option value="${e.id}">${e.legal_name}</option>`).join('');

  const { data: rels } = await supabase
    .from('network_relationships')
    .select('id, rel_type, from_entity:from_entity_id(legal_name), to_entity:to_entity_id(legal_name)');
  document.getElementById('term-rel_id').innerHTML = '<option value="">General (no specific relationship)</option>' +
    (rels||[]).map(r=>`<option value="${r.id}">${r.from_entity?.legal_name} → ${r.to_entity?.legal_name} (${r.rel_type.replace(/_/g,' ')})</option>`).join('');
}

async function loadTerms() {
  const { data } = await supabase
    .from('network_terms')
    .select('id, title, is_active, entity:entity_id(legal_name)')
    .order('created_at', { ascending: false });

  const tbody = document.getElementById('terms-list');
  if (!data?.length) { tbody.innerHTML = '<tr><td colspan="4">No terms yet</td></tr>'; return; }
  tbody.innerHTML = data.map(t => `<tr>
    <td>${t.title}</td>
    <td>${t.entity?.legal_name || '—'}</td>
    <td>${t.is_active ? '✅' : '⬜'}</td>
    <td><button class="secondary" onclick="deleteTerm('${t.id}')">Delete</button></td>
  </tr>`).join('');
}

window.deleteTerm = async (id) => {
  if (!confirm('Delete this term?')) return;
  await supabase.from('network_terms').delete().eq('id', id);
  loadTerms();
};

document.getElementById('terms-form').addEventListener('submit', async e => {
  e.preventDefault();
  const msg = document.getElementById('terms-msg');
  msg.className = 'msg';

  const payload = {
    entity_id: document.getElementById('term-entity_id').value,
    rel_id: document.getElementById('term-rel_id').value || null,
    title: document.getElementById('term-title').value.trim(),
    body: document.getElementById('term-body').value.trim()
  };

  const { error } = await supabase.from('network_terms').insert(payload);
  if (error) { msg.className = 'msg error'; msg.textContent = error.message; return; }
  msg.className = 'msg success'; msg.textContent = 'Term added!';
  e.target.reset();
  loadTerms();
});

loadSelects(); loadTerms();
</script>
</body>
</html>
